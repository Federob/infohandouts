<script>
(function () {
  // Applica tema e font-size a tutti gli editor Monaco nella pagina
  function applyMonacoSettings(isDark) {
    if (typeof monaco === 'undefined') return;
    monaco.editor.setTheme(isDark ? 'vs-dark' : 'vs-light');
    // Riduce il font-size da 17.5pt a ~13px (coerente col sito)
    monaco.editor.getEditors().forEach(function (ed) {
      ed.updateOptions({ fontSize: 13 });
    });
  }

  // Riapplica il font-size agli editor creati successivamente
  function applyMonacoTheme(isDark) {
    applyMonacoSettings(isDark);
  }

  // Legge se il body ha la classe quarto-dark
  function isQuartoDark() {
    return document.body.classList.contains('quarto-dark');
  }

  // Osserva i cambiamenti di classe su body (toggle light/dark di Quarto)
  const bodyObserver = new MutationObserver(function (mutations) {
    mutations.forEach(function (mutation) {
      if (mutation.attributeName === 'class') {
        applyMonacoTheme(isQuartoDark());
      }
    });
  });

  // Attendi che Monaco sia disponibile, poi applica e installa l'observer
  function waitForMonaco() {
    if (typeof monaco !== 'undefined') {
      applyMonacoSettings(isQuartoDark());
      bodyObserver.observe(document.body, { attributes: true });
      // Applica font-size anche agli editor creati successivamente
      monaco.editor.onDidCreateEditor(function (ed) {
        ed.updateOptions({ fontSize: 13 });
      });
    } else {
      setTimeout(waitForMonaco, 200);
    }
  }

  document.addEventListener('DOMContentLoaded', waitForMonaco);

  // Auto-nascondi la notifica pyodide dopo il caricamento
  function watchPyodideStatus() {
    var statusEl = document.getElementById('qpyodide-status-message-text');
    if (!statusEl) {
      setTimeout(watchPyodideStatus, 500);
      return;
    }
    var obs = new MutationObserver(function () {
      var text = statusEl.textContent || '';
      if (text.indexOf('Ready') !== -1 || text.indexOf('ready') !== -1 || text.indexOf('🟢') !== -1) {
        setTimeout(function () {
          var area = document.getElementById('qpyodide-status-message-area');
          if (area) {
            area.style.opacity = '0';
            setTimeout(function () { area.style.display = 'none'; }, 600);
          }
        }, 2000);
        obs.disconnect();
      }
    });
    obs.observe(statusEl, { childList: true, characterData: true, subtree: true });
  }
  document.addEventListener('DOMContentLoaded', watchPyodideStatus);
})();
</script>
